dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:strategy:market-rate-snapshot
info:
  title: DP_STRATEGY_MARKET_RATE_SNAPSHOT
  name: Strategy Market Rate Snapshot
  version: 1.0.0
  status: in development
  product_type: STATE
  description: |
    Datový produkt obsahující přehled tržních úrokových sazeb a konkurenčních nabídek.
    Slouží k monitoringu trhu a podpoře rozhodování při změnách cenotvorby banky.

    Use Cases:
    * UC1 - Monitoring oficiálních sazeb ČNB a jejich porovnání s nabídkami konkurence
    * UC2 - Podpora boardu při reakci na náhlé změny úrokových sazeb na trhu

  owner: Nova Banka \ Strategy \ Tým 6
  contact:
    name: Valeria Lukomskaja
    email: xlukv00@vse.cz

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: false
    regulatory_framework: "None"
    
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: vse_banka
    schema: strategie
    table: dp_strategy_market_rate_snapshot
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: vse_banka
    schema: strategie
    table: dp_strategy_market_rate_snapshot
    
schema:
  - name: dp_strategy_market_rate_snapshot
    description: Přehled tržních sazeb ČNB a konkurenčních nabídek k danému datu
    fields:

      - name: record_id
        type: string
        description: Unikátní identifikátor záznamu (UUID)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: snapshot_date
        type: date
        description: Datum snímku tržních sazeb (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: source
        type: string
        description: Zdroj sazby — ČNB, ČSÚ nebo název konkurenční banky
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: product_type
        type: string
        description: Typ produktu (spořicí účet, hypotéka, spotřebitelský úvěr atp.)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: rate_value
        type: decimal
        description: Hodnota úrokové sazby v procentech p.a.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: is_official
        type: boolean
        description: True pokud jde o oficální sazbu ČNB, False pokud jde o konkurenční nabídku
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: created_at
        type: timestamp
        description: Čas vytvoření záznamu
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id
    description: ID záznamu nesmí být prázdné

  - rule: unique
    field: record_id
    description: Každý záznam musí mít unikátní ID

  - rule: not_null
    field: snapshot_date
    description: Datum snímku nesmí být prázdné

  - rule: not_null
    field: rate_value
    description: Hodnota sazby nesmí být prázdná

  - rule: range
    field: rate_value
    min: -5
    max: 50
    description: Úroková sazba musí být v realistickém intervalu -5 až 50 % p.a.

  - rule: accepted_values
    field: source
    values: [ČNB, ČSÚ, Česká spořitelna, ČSOB, KB, Raiffeisenbank, mBank, AirBank, Fio, Moneta]
    description: Zdroj musí být ze seznamu sledovaných institucí

  - rule: not_null
    field: source
    description: Zdroj sazby nesmí být prázdný

  - rule: row_count
    min: 1
    max: 100000
    description: "Detects data distribution anomalies (volume drop/spike)"

sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 36 months
  support_contact: strategy@nova-banka.cz
