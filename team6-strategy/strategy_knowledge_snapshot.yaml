dataContractSpecification: 1.1.0

id: urn:nova-banka:strategy:ai-knowledge-base:v0.1.0

info:
  title: DP_STRATEGY_KNOWLEDGE_SNAPSHOT
  name: Strategy Knowledge Snapshot
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: On-demand — báze se aktualizuje manuálně při vydání nového strategického dokumentu, bez pravidelného rozvrhu.
    Business Entity: Chunk strategického dokumentu
    Business Purpose: Znalostní báze strategického AI asistenta banky Horizon. Obsahuje chunky textu extrahované ze strategických dokumentů (poslání banky, KPI cíle, cílové segmenty, produkty, komunikační kanály). Slouží jako zdroj dat pro RAG pipeline AI asistenta.
    Consumers: RAG pipeline strategického AI asistenta (interní, Team 6). Ostatní týmy přistupují ke strategickým znalostem přes rozhraní asistenta, nikoli přímo přes tento data produkt.
    Data Sources: Strategické dokumenty banky Horizon ve formátu PDF (např. Horizon-bank-strategy-2025.pdf). Dokumenty jsou manuálně schvalovány a nahrávány týmem Strategie.

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "None"

  owner: "Nova Banka \\ Strategie"
  contact:
    name: Valeria Lukomskaja
    email: xlukv00@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: strategy
    table: strategy_knowledge_snapshot
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: strategy
    table: strategy_knowledge_snapshot

schema:
  - name: strategy_knowledge_snapshot
    description: "Znalostní báze strategického AI asistenta banky Horizon. Obsahuje chunky textu extrahované ze strategických dokumentů."

    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: chunk_id
        type: string
        description: "unikátní ID, není citlivé"
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: source_document
        type: string
        description: "název zdrojového dokumentu, není citlivé"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: page_number
        type: integer
        description: "číslo stránky, není citlivé"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: section_title
        type: string
        description: "název sekce dokumentu, není citlivé"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: content
        type: string
        description: "text chunku, interně citlivé (obsahuje strategické informace banky)"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Confidential

      - name: content_length
        type: integer
        description: "počet znaků, není citlivé"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: created_at
        type: timestamp
        description: "timestamp vytvoření, není citlivé"
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal

      - name: updated_at
        type: timestamp
        description: "timestamp aktualizace, není citlivé"
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: chunk_id
    description: "chunk_id musí být unikátní a nesmí být null"

  - rule: unique
    field: chunk_id

  - rule: not_null
    field: content

  - rule: row_count
    min: 50
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike)"

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: source_document
    values_from: "strategy.approved_documents_reference"
    description: "source_document musí být ze seznamu schválených dokumentů"

  - rule: range
    field: content_length
    min: 50
    max: 2000
    description: "content musí mít min. 50 a max. 2000 znaků"

  - rule: not_null
    field: source_document

  - rule: not_null
    field: page_number

  - rule: no_duplicates
    field: chunk_id
    description: "žádné duplicitní chunky"

sla:
  availability: 99.5%
  data_latency: "On-demand — báze se aktualizuje manuálně při vydání nového strategického dokumentu, bez pravidelného rozvrhu."
  retention_period: "24 měsíců"

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Strategy
    business_owner: "Valeria Lukomskaja - xlukv00@vse.cz"
    product_owner: "Valeria Lukomskaja - xlukv00@vse.cz"
    data_steward: "Valeria Lukomskaja - xlukv00@vse.cz"
    tags:
      - strategie
      - rag
      - ai-asistent
      - znalostni-baze
      - nlp
    classification: "Strategy Data Product"
    data_classification: Confidential
    lineage:
      upstream:
        - name: "Strategické dokumenty banky Horizon ve formátu PDF (např. Horizon-bank-strategy-2025.pdf)"
          type: internal-system
          description: "Dokumenty jsou manuálně schvalovány a nahrávány týmem Strategie."
      downstream:
        - name: "RAG pipeline strategického AI asistenta (interní, Team 6)"
          type: data-product
          description: "Ostatní týmy přistupují ke strategickým znalostem přes rozhraní asistenta, nikoli přímo přes tento data produkt."
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "chunk_id musí být unikátní a nesmí být null"
      - "content musí mít min. 50 a max. 2000 znaků"
      - "source_document musí být ze seznamu schválených dokumentů"
      - "žádné duplicitní chunky"
      - "Volume must be within expected range (50–50000 rows)"
    retention:
      period: "24 měsíců"
      rationale: "Strategické dokumenty mají typický plánovací horizont 2 roky; starší chunky jsou nahrazeny aktualizovanými vydáními strategie."

