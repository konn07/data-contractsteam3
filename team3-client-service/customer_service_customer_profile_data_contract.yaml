dataContractSpecification: 1.1.0
id: urn:horizon-ai-bank:data-contract:team3:customer-service-customer-profile:v0.1.0
info:
  title: Customer Service Customer Profile
  name: Customer Service Customer Profile
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Daily EOD / T+1 (business date + 1 day)
    Business Entity: Customer (Individual & Corporate)
    Business Purpose: This data product contains one current 360-degree customer service
      profile per customer. Each record represents the latest valid customer profile snapshot
      for one customer on a given business date. The product combines customer identification,
      customer type, segmentation, preferred and primary service channels, contact information,
      consent status, and relationship indicators such as active accounts and active products.
      Its purpose is to support omnichannel customer service, reduce handling time, improve
      context visibility in CRM and assisted channels, and provide a consistent customer view
      across service touchpoints.
    Consumers: Call center, branch staff, chat support, CRM users, Customer Service operations,
      Team 1, Team 3, Team 4, Team 5, Team 8
    Data Sources: Customer master data, customer contact records, customer consent records,
      account records, customer product records, and service channel usage history. Main
      silver-layer sources: customer, individual_customer / corporate_customer,
      customer_contact, customer_consent, account, customer_product, and partially channel
      plus interaction/service history for channel-related derivations.

  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework: "GDPR"
    data_minimization: "true — only fields strictly necessary for omnichannel customer service
    are collected; no transactional or financial data beyond account/product counts"
    right_to_erasure: "true — the product holds one snapshot per customer per business date;
    customer records can be purged upon verified erasure request, subject to AML retention
    obligations (min. 5 years for KYC-relevant identifiers)"
    purpose_limitation: "true — processing is strictly limited to customer service context
    visibility and CRM support; data must not be repurposed for marketing or scoring without
    fresh consent"

owner: Horizon AI Bank

contact:
  name: Artur Zakharov
  email: zaka09@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: horizon-ai-bank-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-horizon-ai-bank-prod
    schema: customer_service
    table: customer_service_customer_profile
  DEVELOPMENT:
    type: databricks
    host: horizon-ai-bank-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-horizon-ai-bank-dev
    schema: customer_service
    table: customer_service_customer_profile

schema:
  name: customer_service_customer_profile
  description: >
    360-degree customer service profile snapshot per customer per business date.
    One current record per customer_id per business_date.
  fields:

    - name: record_id
      type: string
      description: Unique record identifier (UUID v4)
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — surrogate key for audit traceability"

    - name: business_date
      type: date
      description: Business processing date (YYYY-MM-DD)
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "BCBS 239 — timeliness of risk data reporting; EBA — data quality
          and timeliness of supervised entity reporting"

    - name: region
      type: string
      description: Geographic region [CZ, SK]
      required: true
      enum: [CZ, SK]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — geographic partitioning for regulatory
          jurisdiction assignment"

    - name: customer_id
      type: string
      description: >
        Technical surrogate identifier for the customer. Non-personal internal key;
        links profile to upstream master data.
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "AML — KYC obligation; internal governance — entity linkage
          and deduplication"

    - name: customer_type
      type: string
      description: Customer legal type — individual or corporate
      required: true
      enum: [individual, corporate]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "AML — KYC obligation requires classification of natural vs.
          legal persons; Internal governance — segmentation logic"

    - name: customer_segment
      type: string
      description: >
        Business segment assigned to the customer (e.g., retail, premium, SME, corporate).
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — CRM routing and service personalisation"

    - name: preferred_contact_channel
      type: string
      description: >
        Customer's self-declared or derived preferred contact channel.
        Allowed values: phone, email, branch, chat, mobile_app.
      required: true
      enum: [phone, email, branch, chat, mobile_app]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "GDPR Art. 5(1)(a) — lawfulness and fairness of processing;
          Internal governance — channel routing"

    - name: primary_service_channel
      type: string
      description: >
        Primary channel through which the customer is currently serviced.
        Derived from interaction history. Allowed values: phone, email, branch, chat, mobile_app.
      required: true
      enum: [phone, email, branch, chat, mobile_app]
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — omnichannel service consistency;
          PSD2 — digital channel monitoring"

    - name: phone_number
      type: string
      description: >
        Customer's primary phone number. Must match valid international or national phone format.
        PII — treated as Confidential.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual
        regulatory_basis: "GDPR Art. 6(1)(b) — processing necessary for performance of contract;
          GDPR Art. 5(1)(c) — data minimisation"

    - name: email
      type: string
      description: >
        Customer's primary email address. Must match valid email format.
        PII — treated as Confidential.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual
        regulatory_basis: "GDPR Art. 6(1)(b) — processing necessary for performance of contract;
          GDPR Art. 5(1)(c) — data minimisation"

    - name: active_account_count
      type: integer
      description: >
        Count of active accounts held by the customer. Must be non-negative.
        Must match the count of active account records in the account source table.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "AML — customer relationship overview for KYC context;
          Internal governance — CRM completeness"

    - name: active_product_count
      type: integer
      description: >
        Count of active products held by the customer. Must be non-negative.
        Must match the count of active customer_product records.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "Internal governance — CRM context and cross-sell awareness"

    - name: marketing_consent_flag
      type: boolean
      description: >
        Indicates whether the customer has a valid active marketing consent record.
        If true, a valid consent record must exist in customer_consent.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
        regulatory_basis: "GDPR Art. 7 — conditions for consent; GDPR Art. 6(1)(a) —
          lawful basis where consent is the processing ground for marketing"

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: customer_id

  - rule: unique
    field: customer_id
    description: "Exactly one current profile record must exist per customer_id on business_date"

  - rule: row_count
    min: 10000
    max: 500000
    description: "Detects data distribution anomalies (volume drop/spike). Expected daily
      load range based on CZ+SK active customer base estimate."

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: customer_type
    values: [individual, corporate]

  - rule: accepted_values
    field: preferred_contact_channel
    values: [phone, email, branch, chat, mobile_app]

  - rule: accepted_values
    field: primary_service_channel
    values: [phone, email, branch, chat, mobile_app]

  - rule: regex
    field: phone_number
    pattern: "^\\+?[0-9\\s\\-\\.]{7,20}$"
    description: "Phone number must match valid national or international phone format"

  - rule: regex
    field: email
    pattern: "^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    description: "Email must match valid email address format"

  - rule: custom
    field: active_account_count
    expression: "active_account_count >= 0"
    description: "active_account_count must be non-negative"

  - rule: custom
    field: active_product_count
    expression: "active_product_count >= 0"
    description: "active_product_count must be non-negative"

  - rule: custom
    field: active_account_count
    description: "active_account_count must match count of active account records in source account table"

  - rule: custom
    field: active_product_count
    description: "active_product_count must match count of active customer_product records"

  - rule: custom
    field: marketing_consent_flag
    description: "If marketing_consent_flag = true, a valid active consent record must exist in customer_consent"

sla:
  availability: 99.5%
  data_latency: Daily EOD / T+1
  retention_period: 36 months

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Customer Service
    business_owner: "Team 3 — Customer Service"
    product_owner: "Artur Zakharov - zaka09@vse.cz"
    data_steward: "Artur Zakharov - zaka09@vse.cz"
    tags:
      - customer-service
      - customer-profile
      - 360-view
      - omnichannel
      - pii
      - gdpr
    classification: "State Data Product"
    data_classification: Confidential

    lineage:
      upstream:
        - name: customer
          type: internal-system
          description: "Master customer entity table — core identification and type fields"
        - name: individual_customer
          type: internal-system
          description: "Individual customer extension — personal contact data (phone, email)"
        - name: corporate_customer
          type: internal-system
          description: "Corporate customer extension — legal entity type and segment data"
        - name: customer_contact
          type: internal-system
          description: "Customer contact records — preferred channel derivation"
        - name: customer_consent
          type: internal-system
          description: "Consent records — marketing_consent_flag and GDPR lawful basis"
        - name: account
          type: internal-system
          description: "Account records — active_account_count derivation"
        - name: customer_product
          type: internal-system
          description: "Customer product records — active_product_count derivation"
        - name: channel
          type: internal-system
          description: "Channel and interaction/service history — primary_service_channel derivation"
      downstream:
        - name: Call Center CRM
          type: data-product
          description: "Primary consumer — provides agent context view during customer interaction"
        - name: Branch Staff Portal
          type: data-product
          description: "Branch service context — customer identification and profile lookup"
        - name: Chat Support System
          type: data-product
          description: "Chat agent context — preferred channel and segment visibility"
        - name: Team 1 Data Product
          type: data-product
          description: "Cross-team consumer — customer profile as enrichment input"
        - name: Team 4 Data Product
          type: data-product
          description: "Cross-team consumer — customer profile as enrichment input"
        - name: Team 5 Data Product
          type: data-product
          description: "Cross-team consumer — customer profile as enrichment input"
        - name: Team 8 Data Product
          type: data-product
          description: "Cross-team consumer — customer profile as enrichment input"

    rules_ko:
      - "record_id must be a valid UUID v4"
      - "customer_id must be unique and not null within each business_date partition"
      - "Exactly one current profile record must exist per customer_id on business_date"
      - "Volume must be within expected range: 10,000 – 500,000 records per daily load"
      - "region must contain only CZ or SK"
      - "customer_type must contain only individual or corporate"
      - "preferred_contact_channel and primary_service_channel must be derived from approved
        channel vocabulary: phone, email, branch, chat, mobile_app"
      - "active_account_count and active_product_count must be non-negative"
      - "phone_number must match valid phone format"
      - "email must match valid email address format"
      - "If marketing_consent_flag = true, a valid active consent record must exist in customer_consent"
      - "active_account_count must match count of active account records in source"
      - "active_product_count must match count of active customer_product records in source"

    retention:
      period: "36 months"
      rationale: >
        Standard Horizon AI Bank operational data retention aligned with customer relationship
        lifecycle. AML regulations require KYC-related records to be retained for a minimum of
        5 years post-relationship end; this product's 36-month rolling window is supplemented by
        archival processes for AML-relevant identifiers (customer_id, customer_type). PII fields
        (phone_number, email) are subject to GDPR erasure rights subject to AML override.

    # Regulatory Mapping — source of truth: Mapování regulací na datové produkty.docx
    regulatory_mapping:
      - regulation: BCBS 239
        status: "Contributes"
        reason: >
          Per the regulatory matrix: the Customer Profile contains defined metrics, lineage,
          data quality rules, and an auditable reporting structure. It supports accuracy,
          completeness, and timeliness of risk-adjacent data reporting, and provides a
          DQ-governed, lineage-traceable data product aligned with BCBS 239 principles.

      - regulation: BASEL IV
        status: "N/A"
        reason: >
          Per the regulatory matrix: the use case is not focused on capital adequacy or
          RWA calculation. Customer service data does not contain risk-weighted assets,
          credit risk inputs, or capital metrics. Marked N/A.

      - regulation: EBA
        status: "Contributes"
        reason: >
          Per the regulatory matrix: data governance is defined through data contracts,
          data owners, and DQ rules. The Customer Profile product contains metadata,
          ownership documentation, and data quality control rules, directly supporting
          EBA data governance and quality framework requirements.

      - regulation: DORA
        status: "Contributes"
        reason: >
          Per the regulatory matrix: the product supports service availability monitoring
          and incident audit via event logs and SLA metrics. Daily T+1 delivery and a 99.5%
          availability SLA contribute to ICT resilience documentation as required by DORA.

      - regulation: AML
        status: "Both"
        reason: >
          Per the regulatory matrix (⚠ — partial): the Customer Profile contains customer
          identification data (customer_id, customer_type) that provides supplementary KYC
          context. The product does not contain detailed transaction monitoring data.
          AML retention requirements (min. 5 years) restrict erasure of KYC identifiers,
          creating both a contribution (KYC context) and a restriction (retention override
          over GDPR erasure).

      - regulation: MiFID II
        status: "N/A"
        reason: >
          Per the regulatory matrix (⚠ — partial, but primary product is Customer Profile):
          the Customer Profile does not contain investment transaction records, best execution
          data, or MiFID II communication archives. The interaction events note is specific
          to the Interaction Events product; the Customer Profile is not primarily designed
          for MiFID II purposes. Marked N/A for this product.

      - regulation: PSD2
        status: "Contributes"
        reason: >
          Per the regulatory matrix: the product contains information about digital service
          channels (preferred_contact_channel, primary_service_channel) and customer journey
          indicators that can be used for monitoring digital services and authentication
          processes relevant to PSD2 open banking obligations.

      - regulation: GDPR
        status: "Both"
        reason: >
          Per the regulatory matrix (↕ — both): the product contains personal data (email,
          phone_number) and a consent flag (marketing_consent_flag), contributing to GDPR
          consent management and data minimisation tracking. GDPR simultaneously restricts
          processing — requiring purpose limitation, access controls, a retention period,
          and support for the right to erasure — making this product both a compliance
          contributor and a regulated subject.

      - regulation: AI Act
        status: "Contributes"
        reason: >
          Per the regulatory matrix: customer profile data may be used as input to high-risk
          AI models such as churn prediction or Next Best Action recommendation systems.
          The product's auditable structure, defined data quality rules, and lineage
          documentation support the transparency and auditability requirements of the
          EU AI Act for high-risk AI systems.

      - regulation: IFRS 9
        status: "N/A"
        reason: >
          Per the regulatory matrix: the use case is not focused on financial reporting or
          ECL modelling. Customer service data does not contain expected credit loss inputs,
          staging data, or historical data for backtesting. Marked N/A.

    # AI Act / FRIA Assessment
    ai_act:
      is_ai_input: true
      is_ai_output: false
      high_risk_classification: true
      fria_required: true
      fria_notes: >
        This product is used (or is likely to be used) as input to AI/ML models within
        Horizon AI Bank, including churn prediction, Next Best Action recommendation,
        and customer segmentation models. These applications fall under the EU AI Act
        high-risk classification for AI systems used in financial services affecting
        individual customers (Annex III — creditworthiness assessment and financial
        services personalisation).

        Fundamental Rights Impact Assessment (FRIA) is required because:
        (1) Affected persons: all retail and corporate customers whose profile data feeds
            AI models — potentially all active bank customers in CZ and SK.
        (2) Rights at risk: right to non-discrimination (profiling via customer_segment
            and channel behaviour may embed historical bias); right to explanation under
            GDPR Art. 22 (automated decision-making); right to privacy (PII fields
            phone_number and email are AI inputs).
        (3) Bias mitigation measures required: model training datasets derived from this
            product must be audited for demographic bias in customer_segment and channel
            preference distributions; fairness metrics must be documented; human oversight
            must be mandated for decisions materially affecting individual customers.
        (4) Data quality gate: this product's DQ rules (row_count range, not_null,
            referential integrity) serve as a mandatory upstream quality gate before
            ingestion into AI training or inference pipelines.

  glossary_entry:
    term: "Customer Service Customer Profile"
    definition: >
      A consolidated, current-state data product representing a single 360-degree service
      profile per bank customer, refreshed daily. It integrates customer identification,
      classification, segmentation, preferred and primary service channels, contact data,
      marketing consent status, and relationship summary indicators (active accounts and
      products). The product serves as the authoritative customer context record for all
      omnichannel service interactions across call centre, branch, chat, and digital channels.
    fibo_class: "fibo-cbc:BankCustomer"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FBC/ProductsAndServices/ClientsAndAccounts/BankCustomer"
    domain: Customer Service
    dawiso_status: draft
    steward: "Artur Zakharov - zaka09@vse.cz"
    synonyms:
    - Customer 360 Profile
    - Customer Master Profile
    - Unified Customer View
    - Single Customer View (SCV)
    acronyms:
    - SCV
    - C360
    related_capability: "Omnichannel Customer Service / CRM Context Management"
    related_terms:
    - "Customer Master Data"
    - "Customer Segment"
    - "Marketing Consent"
    - "Service Channel"
    - "Customer Interaction Event"
    - "KPI Performance Metric"
    kg_triple: >
      (CustomerServiceCustomerProfile) --[isSnapshotOf]--> (BankCustomer)
      (CustomerServiceCustomerProfile) --[containsConsentRecord]--> (MarketingConsent)
      (CustomerServiceCustomerProfile) --[derivedFrom]--> (CustomerMasterData)
      (CustomerServiceCustomerProfile) --[consumedBy]--> (OmnichannelServiceChannel)
