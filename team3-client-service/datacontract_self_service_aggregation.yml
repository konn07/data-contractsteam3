dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:customer-service:self-service-adoption
info:
  title: DP_CUSTOMER_SERVICE_SELF_SERVICE_ADOPTION
  name: Self-Service Adoption (Process x Channel x Day)
  maturity_score: 50%
  version: 1.0.0
  status: in development
  description: 'Zvýšit adopci digitální samoobsluhy napříč klíčovými klientskými procesy


    Value:

    Snížení provozních nákladů na obsluhu, optimalizace kapacit poboček a zvýšení
    dostupnosti služeb 24/7.


    Use Case:

    Monitoring self-service adoption dle procesu a kanálu. Identifikace procesů s
    nízkou digitální penetrací jako podklad pro prioritizaci digitalizačních iniciativ.


    Consumer:

    Digital Banking management, Retail Operations, procesní vlastníci


    Granularity:

    Detail per proces × kanál × den (+ volitelně segment)


    Time aggregation:

    Denní EOD


    Freshness:

    Denní (T+1)


    Data sources:

    - Digitální kanály (IB/MB event logy)

    - CRM (obslužné procesy)

    - Core Banking System (výsledky procesu)

    - Web/App analytika

    - Číselník procesů a kanálů

    '
  owner: Nova Banka \ Team3 \ Obsluha klienta
  contact:
    name: Artur Zakharov
    email: zaka09@vse.cz
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: customer_service_prod
    table: dp_customer_service_self_service_daily
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: customer_service_dev
    table: dp_customer_service_self_service_daily
schema:
- name: dp_customer_service_self_service_daily
  description: Denní adopce digitální samoobsluhy dle procesu a kanálu.
  fields:
  - name: business_date
    type: date
    description: KPI date (daily).
    required: true
    example: '2026-03-04'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: process_code
    type: string
    description: Customer process identifier (from process catalog).
    required: true
    example: change_address
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: channel
    type: string
    description: Channel where the process was executed.
    required: true
    enum:
    - ib
    - mb
    - branch
    - call_center
    - chat
    example: ib
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: segment_code
    type: string
    description: Optional customer segment for breakdown.
    required: false
    example: MASS
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: started_count
    type: integer
    description: Number of process starts in the bucket.
    required: true
    example: 1200
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: completed_count
    type: integer
    description: Number of successful completions in the bucket.
    required: true
    example: 980
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: completion_rate
    type: double
    description: completed_count / started_count (0..1).
    required: false
    example: 0.82
    x-compliance:
      is_pii: false
      sensitivity: Internal
quality:
- rule: not_null
  field: business_date
  description: business_date nesmí být prázdné
- rule: not_null
  field: process_code
  description: process_code nesmí být prázdné
- rule: not_null
  field: channel
  description: channel nesmí být prázdné
- rule: accepted_values
  field: channel
  values:
  - ib
  - mb
  - branch
  - call_center
  - chat
  description: channel musí být z definované množiny
- rule: range
  field: completion_rate
  min: 0.0
  max: 1.0
  description: completion_rate musí být v rozsahu 0..1 (pokud vyplněno)
sla:
  availability: 99.5%
  data_latency: Denní (T+1)
  retention_period: 36 months
  support_contact: zaka09@vse.cz
