dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:investment-banking:investment-corporate-snapshot

info:
  title: DP_INVESTMENT_CORPORATE_SNAPSHOT
  name: Investment Corporate Snapshot
  version: 1.0.0
  status: active
  description: |
    Sjednocený dataset korporátních entit integrující interní data banky s externími zdroji.
    Use Cases:
    * UC1 - Investiční analýza
    * UC2 - Credit risk scoring
  owner: Nova Banka \ Investment Banking \ Tým 8
  contact:
    name: Head of Investment Banking
    email: investment.banking@nova-banka.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: vse_banka
    schema: investment_banking
    table: dp_investment_corporate_snapshot

schema:
  - name: dp_investment_corporate_snapshot
    description: Standardizovaná data korporátních entit
    fields:
      - name: company_id
        type: string
        description: Unikátní identifikátor společnosti
        required: true
      - name: company_name
        type: string
        description: Oficiální název společnosti
        required: true
      - name: nace_code
        type: string
        description: Odvětvová klasifikace dle NACE
        required: true
      - name: revenue
        type: decimal
        description: Celkové tržby společnosti
        required: false
      - name: ebitda
        type: decimal
        description: EBITDA převedená z CAS na IFRS
        required: false
      - name: financial_year
        type: integer
        description: Fiskální rok
        required: true
      - name: created_at
        type: timestamp
        description: Čas vygenerování záznamu
        required: true

quality:
  - rule: not_null
    field: company_id
    description: ID společnosti nesmí být prázdné
  - rule: unique
    field: company_id
    description: Každá společnost musí mít unikátní ID
  - rule: not_null
    field: nace_code
    description: NACE kód nesmí být prázdný

sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 60 months
  support_contact: investment.banking@nova-banka.cz
