dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:investment-banking:investment-corporate-snapshot
info:
  title: DP_INVESTMENT_CORPORATE_SNAPSHOT
  name: Investment Corporate Snapshot
  version: 1.0.0
  status: active
  description: 'Sjednoceny dataset korporatnich entit.

    '
  owner: Nova Banka \ Investment Banking \ Tym 8
  contact:
    name: Head of Investment Banking
    email: investment.banking@nova-banka.cz
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: vse_banka
    schema: investment_banking
    table: dp_investment_corporate_snapshot
schema:
- name: dp_investment_corporate_snapshot
  description: Standardizovana data korporatnich entit
  fields:
  - name: company_id
    type: string
    description: Unikatni identifikator spolecnosti
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: company_name
    type: string
    description: Nazev spolecnosti
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: nace_code
    type: string
    description: NACE klasifikace
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: financial_year
    type: integer
    description: Fiskalni rok
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: created_at
    type: timestamp
    description: Cas vytvoreni
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
quality:
- rule: not_null
  field: company_id
  description: ID nesmi byt prazdne
- rule: unique
  field: company_id
  description: ID musi byt unikatni
sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 60 months
  support_contact: investment.banking@nova-banka.cz
