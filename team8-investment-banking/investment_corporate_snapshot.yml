  glossary_entry:
    term: "Investment Corporate Snapshot"
    definition: "An aggregated dataset containing structured financial and descriptive attributes of companies used for investment analysis and risk assessment."
    fibo_class: "fibo-fbc-pas-fpas:FinancialOrganization"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FBC/ProductsAndServices/FinancialProductsAndServices/FinancialOrganization"
    domain: Investment
    dawiso_status: draft
    steward: Ondřej Houdek - houo04@vse.cz
    synonyms:
      - "Investiční profil společnosti"
    acronyms:
      - ICS
    related_capability: "Investment Analysis"
    related_terms:
      - "Company Financial Profile"
      - "Credit Risk Assessment"
