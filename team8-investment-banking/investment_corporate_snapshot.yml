dataContractSpecification: 1.1.0
id: urn:datacontract:investment:investment-corporate-snapshot:v0.1.0

info:
  title: Investment Corporate Snapshot
  name: Investment Corporate Snapshot
  product_type: AGGREGATION
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Aggregated dataset providing structured financial and descriptive information about potential investment target companies. The dataset combines external public data sources with internal bank data to support investment analysis, benchmarking, clustering, and risk assessment.
    Data latency: Bi-weekly refresh (every 2 weeks)
    Business Entity:  Company
    Business Purpose: Support investment decision-making, peer benchmarking, clustering analysis, and credit risk assessment
    Consumers:        Investment Peer Benchmark Profile (Team 8), Credit Risk Credit Memo (Team 7), internal risk scoring systems
    Data Sources:     External providers (CRIBIS, ORBIS, MagnusWeb, Mergermarket), Customer Service Customer Profile (Team 3)

  x-regulatory:
    gdpr_relevant: false
    critical_data_element: true
    regulatory_framework: "BCBS 239"
    data_minimization: "true"
    right_to_erasure: "false"
    purpose_limitation: "true"

  owner: Horizon AI Bank \ Team 8 \ Investment
  contact:
    name: Ondřej Houdek
    email: houo04@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: investment-prod
    table: investment_corporate_snapshot
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: investment-dev
    table: investment_corporate_snapshot

schema:
  - name: investment_corporate_snapshot
    description: Aggregated company-level dataset for investment and risk analysis
    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — surrogate key for audit traceability"

      - name: business_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — timeliness of risk data reporting"

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — geographic partitioning"

      - name: ic
        type: string
        description: Company identification number (ICO)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — entity identification"

      - name: nazev_subjektu
        type: string
        description: Company name
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — entity identification"

      - name: hlavni_nace_kod
        type: string
        description: Main NACE classification code
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "EU NACE regulation — industry classification"

      - name: pravni_forma
        type: string
        description: Legal form of the company
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance"

      - name: kategorie_obratu
        type: string
        description: Turnover category
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance"

      - name: avg_monthly_turnover
        type: double
        description: Average monthly turnover (internal KPI)
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "BCBS 239 — risk data aggregation"

      - name: cash_flow_volatility
        type: double
        description: Cash flow volatility metric
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "BCBS 239 — risk metrics"

      - name: credit_limit_utilization
        type: double
        description: Credit limit utilization ratio
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "BCBS 239 — credit risk monitoring"

      - name: days_past_due_max
        type: integer
        description: Maximum days past due
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "BCBS 239 — credit risk monitoring"

      - name: mena
        type: string
        description: Currency (CZK/EUR)
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance"

      - name: obdobi_od
        type: date
        description: Accounting period start date
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — time reference"

      - name: obdobi_do
        type: date
        description: Accounting period end date
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — time reference"

      - name: vlastni_kapital
        type: double
        description: Equity
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "IFRS — financial reporting"

      - name: provozni_hospodarsky_vysledek
        type: double
        description: Operating profit/loss
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "IFRS — financial reporting"

      - name: obezna_aktiva
        type: double
        description: Current assets
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "IFRS — balance sheet reporting"

      - name: kratkodobe_zavazky
        type: double
        description: Short-term liabilities
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "IFRS — balance sheet reporting"

quality:
  - rule: not_null
    field: record_id
  - rule: unique
    field: record_id

  - rule: row_count
    min: 5000
    max: 10000
    description: "Detects data distribution anomalies (volume drop/spike)"

  - rule: accepted_values
    field: region
    values: [CZ, SK]

sla:
  availability: 99.5%
  data_latency: Bi-weekly
  retention_period: 60 months

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Investment
    business_owner: Head of Investment Analytics
    product_owner: Ondřej Houdek - houo04@vse.cz
    data_steward: Ondřej Houdek - houo04@vse.cz
    tags:
      - investment
      - aggregation
    classification: "Analytical Data Product"
