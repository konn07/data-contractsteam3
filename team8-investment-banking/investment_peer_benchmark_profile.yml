    ai_act:
      is_ai_input: true
      is_ai_output: false
      high_risk_classification: false
      fria_required: false
      fria_notes: "Used as input for clustering models without impact on individual rights"

  glossary_entry:
    term: "Investment Peer Benchmark Profile"
    definition: "A dataset grouping companies into clusters based on financial and operational similarity for benchmarking and investment analysis."
    fibo_class: "fibo-fnd-rel-rel:Classification"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Relations/Relations/Classification"
    domain: Investment
    dawiso_status: draft
    steward: Ondřej Houdek - houo04@vse.cz
    synonyms:
      - "Profil srovnatelných investičních společností"
    acronyms:
      - "IPBP"
    related_capability: "Investment Analysis"
    related_terms:
      - "Company Segmentation"
      - "Peer Group Analysis"
