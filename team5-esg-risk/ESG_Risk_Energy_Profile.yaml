schema:
  name: esg_risk_building_energy_assessment_state
  description: >
    State data product capturing energy performance certificates and environmental
    risk attributes for buildings assessed for loan approval and ESG reporting at Nova Banka.
 
  fields:
    - name: record_id
      type: string
      description: Unique record identifier (UUID v4)
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: business_date
      type: date
      description: Business processing date (YYYY-MM-DD)
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: region
      type: string
      description: Geographic region [CZ, SK]
      required: true
      enum: [CZ, SK]
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: building_id
      type: string
      description: >
        Unique identifier of the building sourced from the RUIAN registry.
        Must not be null; every building must carry a unique ID (business rule KO).
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: address
      type: string
      description: >
        Full postal address of the building (street, house number, city, postal code).
        Used as the primary input for GPS-based energy label derivation. Contains personal
        data when linked to an individual borrower.
      required: true
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual
 
    - name: energy_label
      type: string
      description: >
        Energy performance class of the building (A–G) derived by ICM Gen AI from
        GPS location and public registry data. Must not be null (business rule KO).
      required: true
      enum: [A, B, C, D, E, F, G]
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: flood_zone
      type: string
      description: >
        Flood risk zone classification for the building location,
        sourced from VÚV TGM (T.G. Masaryk Water Research Institute).
      required: false
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: avg_temperature_5y
      type: number
      description: >
        Average annual air temperature at the building's location over the preceding
        5 calendar years (°C), sourced from CHMI (Czech Hydrometeorological Institute).
      required: false
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
quality:
  - rule: not_null
    field: record_id
 
  - rule: unique
    field: record_id
 
  - rule: not_null
    field: building_id
 
  - rule: unique
    field: building_id
 
  - rule: not_null
    field: energy_label
 
  - rule: accepted_values
    field: energy_label
    values: [A, B, C, D, E, F, G]
 
  - rule: row_count
    min: 5000
    max: 500000
    description: "Detects data distribution anomalies (volume drop/spike) in daily building energy assessment snapshots"
 
  - rule: accepted_values
    field: region
    values: [CZ, SK]
 
sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 36 months
 
x-dawiso:
  data_product:
    dawiso_status: design
    domain: ESG Risk
    business_owner: Nova Banka
    product_owner: Anna Spilková - spia05@vse.cz
    data_steward: Anna Spilková - spia05@vse.cz
    tags:
      - ESG
      - Energy Performance Certificate
      - Building Assessment
      - Climate Risk
      - Green Lending
    classification: "ESG Risk Data Product"
    data_classification: Confidential
    lineage:
      upstream:
        - name: RUIAN
          type: internal-system
          description: "Register of Territorial Identification, Addresses and Real Estate — authoritative source for building IDs and postal addresses"
        - name: VÚV TGM
          type: internal-system
          description: "T.G. Masaryk Water Research Institute — source of flood zone classifications"
        - name: CHMI
          type: internal-system
          description: "Czech Hydrometeorological Institute — source of 5-year average temperature data"
        - name: ICM Gen AI
          type: internal-system
