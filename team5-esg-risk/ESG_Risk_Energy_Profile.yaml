dataContractSpecification: 1.1.0
id: urn:nova-banka:esg-risk:building-energy-assessment-state:v0.1.0
info:
  title: ESG Risk Building Energy Assessment State
  name: esg_risk_building_energy_assessment_state
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: D+1
    Business Entity: Building (Budova)
    Business Purpose: Automated estimation of building energy performance for loan approval
      and ESG valuation reporting. Based on GPS location, an energy label (A–G) is derived
      using ICM Gen AI and public registries (RUIAN, VÚV TGM, CHMI).
    Consumers: Customer Service (Obsluha klienta)
    Data Sources: ICM Gen AI, Public Registries (RUIAN, VÚV TGM, CHMI)
 
  owner: Nova Banka
  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework:
      - GDPR
      - "BCBS 239"

contact:
