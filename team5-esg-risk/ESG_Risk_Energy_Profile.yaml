      - "Volume must be within expected range (5 000 – 500 000 records per snapshot)"
    retention:
      period: "36 months"
      rationale: >
        Aligned with credit file retention requirements and ESG reporting obligations
        under CSRD and internal Nova Banka data governance policy.
 
glossary_entry:
  term: "Building Energy Performance Certificate"
  definition: >
    A standardised classification (A–G) representing the energy efficiency of a building,
    derived from its GPS location, physical characteristics, and environmental data
    (flood zone, multi-year temperature). Used by Nova Banka to support ESG-aligned
    credit decisions, collateral valuation, and regulatory ESG reporting.
  fibo_class: "fibo-fnd-plc-loc:PhysicalLocation"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Places/Locations/PhysicalLocation"
  domain: ESG Risk
  dawiso_status: draft
  steward: Anna Spilková - spia05@vse.cz
  synonyms:
    - Energy Certificate
    - Energetický průkaz budovy
    - Building EPC
  acronyms:
    - EPC
  related_capability: "ESG Risk Assessment, Collateral Valuation, Green Mortgage Origination"
  related_terms:
