schema:
  name: esg_risk_building_esg_score_state
  description: >
    State data product capturing composite ESG scores and underlying sub-indices
    for buildings assessed during loan origination and collateral valuation
    workflows at Nova Banka.
 
  fields:
    - name: record_id
      type: string
      description: Unique record identifier (UUID v4)
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: business_date
      type: date
      description: Business processing date (YYYY-MM-DD)
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: region
      type: string
      description: Geographic region [CZ, SK]
      required: true
      enum: [CZ, SK]
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: building_id
      type: string
      description: >
        Unique identifier of the building sourced from the RUIAN registry.
        Must not be null; every building must carry a unique ID (business rule KO).
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: address
      type: string
      description: >
        Full postal address of the building (street, house number, city, postal code).
        Used to geo-locate the building and join public registry data for ESG
        score derivation. Constitutes personal data when linked to an individual borrower.
      required: true
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual
 
    - name: esg_score
      type: number
      description: >
        Composite ESG score for the building on a scale of 0 (worst) to 100 (best),
        computed by ICM Gen AI from environmental, social, and governance sub-signals.
        Must not be null and must be within the range 0–100 (business rule KO).
      required: true
      minimum: 0
      maximum: 100
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: quality_of_life_index
      type: number
      description: >
        Statistical quality-of-life index for the building's municipality,
        sourced from the Czech Statistical Office (ČSÚ). Used as the social (S)
        component of the ESG score calculation.
      required: false
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
    - name: crime_index
      type: number
      description: >
        Normalised crime-rate index for the building's municipality,
        sourced from the Czech Police (PČR). Used as a governance (G) risk
        proxy in the ESG score calculation.
      required: false
      x-compliance:
        is_pii: false
        sensitivity: Internal
 
quality:
  - rule: not_null
    field: record_id
 
  - rule: unique
    field: record_id
 
  - rule: not_null
    field: building_id
 
  - rule: unique
    field: building_id
 
  - rule: not_null
    field: esg_score
 
  - rule: range
    field: esg_score
    min: 0
    max: 100
    description: "ESG score must be within the valid range of 0 to 100"
 
  - rule: row_count
    min: 5000
    max: 500000
    description: "Detects data distribution anomalies (volume drop/spike) in daily building ESG score snapshots"
 
  - rule: accepted_values
    field: region
    values: [CZ, SK]
 
sla:
  availability: 99.5%
  data_latency: D+1
  retention_period: 36 months
 
x-dawiso:
  data_product:
    dawiso_status: design
    domain: ESG Risk
    business_owner: Nova Banka
    product_owner: Anna Spilková - spia05@vse.cz
