dataContractSpecification: 1.1.0
id: urn:nova-banka:esg-risk:building-esg-score-state:v0.1.0
info:
  title: ESG Risk Building ESG Score State
  name: esg_risk_building_esg_score_state
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: D+1
    Business Entity: Building (Budova)
    Business Purpose: Calculation of a composite ESG score (0–100) per building to
      support credit approval decisions and collateral valuation at Nova Banka.
      The score aggregates environmental, social, and governance signals derived
      from ICM Gen AI and multiple public registries (VÚV TGM, CHMI, ČSÚ, PČR).
    Consumers: Customer Service (Obsluha klienta)
    Data Sources: ICM Gen AI, VÚV TGM (flood/water risk), CHMI (climate/weather),
      ČSÚ (Czech Statistical Office — quality-of-life index),
      PČR (Czech Police — crime index)
 
  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework: "GDPR, BCBS 239, IFRS 9"
 
owner: Nova Banka
contact:
  name: Anna Spilková
  email: spia05@vse.cz
 
