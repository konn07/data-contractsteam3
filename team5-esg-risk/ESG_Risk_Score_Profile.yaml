        - name: ČSÚ
          type: internal-system
          description: "Czech Statistical Office — source of quality-of-life index (social component)"
        - name: PČR
          type: internal-system
          description: "Czech Police — source of crime index (governance component)"
      downstream:
        - name: Customer Service Platform
          type: data-product
          description: "Consumes ESG scores to support loan approval and ESG collateral valuation workflows"
        - name: ESG Risk Building Energy Assessment State
          type: data-product
          description: "Complementary state product providing energy label (A–G) enriching the ESG scoring context"
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "building_id must not be null or empty"
      - "building_id must be unique per record"
      - "esg_score must not be null or empty"
      - "esg_score must be within the range 0 to 100 (inclusive)"
      - "Volume must be within expected range (5 000 – 500 000 records per snapshot)"
    retention:
      period: "36 months"
      rationale: >
        Aligned with credit file retention requirements and ESG reporting obligations
        under CSRD, IFRS 9 provisioning lookbacks, and Nova Banka internal
        data governance policy.
 
glossary_entry:
  term: "Building ESG Score"
  definition: >
    A composite numerical indicator (0–100) quantifying the Environmental, Social,
    and Governance risk profile of a specific building. The score is derived by
    ICM Gen AI from publicly available registry data covering flood exposure,
    climate metrics, quality of life, and local crime rates. It is used by
    Nova Banka as a decision-support signal in credit approval processes and
    as an ESG-adjusted collateral valuation metric in line with CSRD and
    IFRS 9 requirements.
  fibo_class: "fibo-fnd-arr-asmt:AssessmentActivity"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Assessments/AssessmentActivity"
  domain: ESG Risk
  dawiso_status: draft
  steward: Anna Spilková - spia05@vse.cz
  synonyms:
    - ESG Rating
    - Building Sustainability Score
    - ESG skóre budovy
  acronyms:
    - ESG
  related_capability: "ESG Risk Assessment, Credit Scoring, Collateral Valuation, Green Mortgage Origination"
  related_terms:
    - "Building Energy Performance Certificate"
    - "Quality of Life Index"
    - "Crime Index"
    - "Flood Zone"
    - "Climate Physical Risk"
    - "RUIAN Building Registry"
    - "Green Mortgage"
