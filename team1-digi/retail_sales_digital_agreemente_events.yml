dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:digital-sales:retail-digital-agreement-events
info:
  title: DP_RETAIL_DIGITAL_AGREEMENT_EVENTS
  name: Retail Sales Digital Agreement Events
  maturity_score: 65%
  version: 1.0.0
  status: in development
  product_type: EVENT
  x-regulatory:
    gdpr_relevant: true
    critical_data_element: false
    regulatory_framework: GDPR
  description: 'Datový produkt obsahuje detailní události z procesu digitálního onboardingu

    klientů v mobilní aplikaci nebo internetovém bankovnictví.


    Zaznamenává jednotlivé kroky procesu registrace,

    například nahrání dokladů, ověření identity,

    podpis smlouvy nebo přerušení procesu.


    Produkt slouží k analýze digitálního funnelu,

    identifikaci míst s vysokým drop-off rate

    a optimalizaci uživatelského prostředí aplikace.


    Data mohou být využita také pro AI modely,

    které predikují pravděpodobnost nedokončení registrace.


    Latence dat: Real-time


    Use Cases:

    * UC1 - analýza průběhu digitálního onboardingu

    * UC2 - optimalizace UX

    * UC3 - AI pomoc při zdlouhavé registraci

    '
  owner: Nova Banka \ Team1 \ Digital Sales
  contact:
    name: Digital Sales Team
    email: digital.sales@nova-banka.cz
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-prod
    schema: digital_sales
    table: dp_retail_digital_onboarding_events
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-dev
    schema: digital_sales
    table: dp_retail_digital_onboarding_events
schema:
- name: dp_retail_digital_onboarding_events
  description: Události digitálního onboardingu
  fields:
  - name: event_id
    type: string
    description: Unikátní identifikátor události
    required: true
    unique: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: session_id
    type: string
    description: Identifikátor uživatelské relace
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: user_id
    type: string
    description: Anonymizovaný identifikátor uživatele
    required: false
    x-compliance:
      is_pii: true
      sensitivity: Confidential
      legal_basis: Contractual
  - name: event_type
    type: string
    description: Typ události v procesu onboardingu
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: step_name
    type: string
    description: Název kroku onboardingu
    required: false
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: event_timestamp
    type: timestamp
    description: Čas události
    required: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: device_type
    type: string
    description: Typ zařízení
    required: false
    x-compliance:
      is_pii: false
      sensitivity: Internal
quality:
- rule: not_null
  field: event_id
- rule: unique
  field: event_id
- rule: not_null
  field: event_timestamp
- rule: row_count
  min: 100
  max: 10000000
  description: Detects data distribution anomalies in digital onboarding events
sla:
  availability: 99.9%
  data_latency: real_time
  retention_period: 24 months
  support_contact: digital.channels@nova-banka.cz
