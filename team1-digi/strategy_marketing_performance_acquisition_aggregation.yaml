info:
  title: Strategy Marketing Performance Acquisition Aggregation
  name: strategy_marketing_performance_acquisition_aggregation
  product_type: AGGREGATION
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Daily (D+1, available by ~7:00 AM CET)
    Business Entity: Marketing Campaign / Customer Acquisition
    Business Purpose: Aggregated KPI metrics for marketing campaigns including number
      of acquired clients, total campaign costs, and cost per acquisition (CPA).
      Each row represents a unique combination of date, campaign, and platform.
      Supports marketing team performance tracking, management reporting, finance
      reconciliation, and BI analytics across all active marketing channels.
    Consumers: Marketing team, management, finance, BI tools
    Data Sources: Advertising platforms (Google Ads, Meta Ads, Affiliate),
      web tracking, CRM, core banking system

  x-regulatory:
