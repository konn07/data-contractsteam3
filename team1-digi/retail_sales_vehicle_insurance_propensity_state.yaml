glossary_entry:
  term: "Vehicle Insurance Propensity Score"
  definition: >
    A machine-learning-derived probability estimate, expressed as a decimal in the
    range [0.0, 1.0], indicating the likelihood that a specific retail banking
    customer will purchase a vehicle insurance product within a defined forward-looking
    window (typically 30 days). The score is computed from behavioral transaction
    features — including fuel spend, automotive service activity, highway vignette
    purchases, and general transaction patterns — captured in daily customer snapshot
    profiles. It is used by marketing and CRM functions to prioritise cross-sell
    outreach and optimise campaign targeting efficiency within the Retail Sales domain.
  fibo_class: "fibo-fnd-arr-asmt:Score"
  fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Arrangements/Assessments/"
  domain: Retail Sales
  dawiso_status: draft
  steward: "Xuan Vi Phamová - phax00@vse.cz"
  synonyms:
    - Insurance Propensity Score
    - Vehicle Insurance Likelihood Score
    - Cross-sell Propensity Score
    - Pravděpodobnost nákupu pojištění vozidla
  acronyms:
    - VIP Score
  related_capability: "Retail Cross-sell Management"
  related_terms:
    - "Customer Segmentation (segmentace)"
    - "Behavioural Feature Engineering"
    - "ML Model Scoring Pipeline (reprodukovatelnost scoringu)"
    - "Cross-sell Campaign Activation"
    - "Customer Lifetime Value (CLV)"
    - "Automated Decision-Making (GDPR Art. 22)"
    - "Pojištění vozidel (Vehicle Insurance)"
