schema:
  name: retail_sales_vehicle_insurance_propensity_state
  description: >
    Daily historized customer-level state table containing behavioral transaction
    features and a vehicle insurance propensity score. One row per client per
    snapshot_date. Supports cross-sell campaign activation, ML model serving, and
    regulatory audit and explainability obligations (GDPR Art. 22).

  fields:
    - name: record_id
      type: string
      description: Unique record identifier (UUID v4)
      required: true
      unique: true
      x-compliance:
        is_pii: false
        sensitivity: Internal

    - name: business_date
      type: date
      description: Business processing date (YYYY-MM-DD)
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal

    - name: region
      type: string
      description: >
        Geographic region of the customer's primary account or residence [CZ, SK].
        Treated as personal data under GDPR when linked to an identified individual
        via client_id.
      required: true
      enum: [CZ, SK]
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: client_id
      type: string
      description: >
        Pseudonymised internal customer identifier linking the propensity record
        to the customer master in the core banking system. Acts as the primary
        business key. Constitutes personal data under GDPR when combined with
        other fields in this product.
      required: true
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: snapshot_date
      type: date
      description: >
        Date for which the customer feature snapshot and propensity score were
        computed (YYYY-MM-DD). Together with client_id forms the composite
        natural key of the table. Enforces one-row-per-client-per-day constraint.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal

    - name: propensity_score
      type: decimal
      description: >
        Model-generated probability (0.0–1.0) indicating the customer's likelihood
        to purchase vehicle insurance within the next 30 days. Produced by the
        ML scoring pipeline.
      required: true
      x-compliance:
        is_pii: false
        sensitivity: Internal

    - name: segment
      type: string
      description: >
        Customer segment label assigned based on propensity score banding or CRM
        segmentation logic (e.g., HIGH, MEDIUM, LOW). Used for campaign targeting
        tier selection.
      required: true
      enum: [HIGH, MEDIUM, LOW]
      x-compliance:
        is_pii: false
        sensitivity: Internal

    - name: fuel_spend_30d
      type: decimal
      description: >
        Total CZK spend on fuel-related merchant category codes (MCC) in the 30 days
        preceding snapshot_date. Behavioral vehicle ownership signal. Linked to an
        identified individual — treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: fuel_txn_count_30d
      type: integer
      description: >
        Number of fuel-related transactions in the 30 days preceding snapshot_date.
        Frequency behavioral signal complementing fuel_spend_30d.
        Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: fuel_spend_90d
      type: decimal
      description: >
        Total CZK spend on fuel-related MCCs in the 90 days preceding snapshot_date.
        Longer-horizon behavioral signal for vehicle usage pattern detection.
        Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: service_txn_count_90d
      type: integer
      description: >
        Number of automotive service transactions (e.g., car service, tyre shops)
        in the 90 days preceding snapshot_date. Indicates vehicle ownership and
        maintenance behavior. Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: highway_vignette_flag
      type: boolean
      description: >
        Flag indicating whether the customer purchased a highway vignette in the
        observation window, inferred from transaction data. Strong vehicle ownership
        signal. Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: insurance_payment_flag
      type: boolean
      description: >
        Flag indicating whether the customer has an active insurance payment
        detected in transaction data. Used as a feature and exclusion criterion
        in campaign targeting. Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: days_since_last_insurance
      type: integer
      description: >
        Number of days elapsed since the last detected insurance-related payment
        as of snapshot_date. Null if no insurance payment is detected in history.
        Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: avg_txn_amount
      type: decimal
      description: >
        Average transaction amount in CZK over the 90-day observation window.
        Used as a proxy for customer financial activity level. Treated as personal
        data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: total_txn_count_90d
      type: integer
      description: >
        Total number of debit/credit transactions executed by the customer in
        the 90 days preceding snapshot_date. General activity behavioral signal.
        Treated as personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: age_band
      type: string
      description: >
        Age bracket of the customer (e.g., 18-25, 26-35, 36-50, 51-65, 65+).
        Derived from date of birth held in the core banking system. Constitutes
        personal data under GDPR.
      required: false
      x-compliance:
        is_pii: true
        sensitivity: Confidential
        legal_basis: Contractual

    - name: dq_flag
      type: string
      description: >
        Data quality flag propagated from upstream feature engineering pipeline.
        Indicates whether the customer record passed (PASS) or failed (FAIL)
        upstream data quality checks. Used to exclude low-confidence records
        from campaign activation.
      required: false
      enum: [PASS, FAIL, UNKNOWN]
      x-compliance:
        is_pii: false
        sensitivity: Internal

quality:
  - rule: not_null
    field: record_id

  - rule: unique
    field: record_id

  - rule: not_null
    field: client_id

  - rule: not_null
    field: snapshot_date

  - rule: not_null
    field: propensity_score

  - rule: not_null
    field: segment

  - rule: not_null
    field: business_date

  - rule: accepted_values
    field: region
    values: [CZ, SK]

  - rule: accepted_values
    field: segment
    values: [HIGH, MEDIUM, LOW]

  - rule: accepted_values
    field: dq_flag
    values: [PASS, FAIL, UNKNOWN]

  - rule: row_count
    min: 10000
    max: 2000000
    description: >
      Detects data distribution anomalies (volume drop/spike). Each daily snapshot
      is expected to contain between 10,000 and 2,000,000 customer rows reflecting
      the active retail banking customer base across CZ and SK. Values outside this
      range trigger a distribution anomaly alert.

  - rule: custom
    name: composite_key_uniqueness
    description: >
      The combination of client_id and snapshot_date must be unique per daily load,
      enforcing one row per customer per snapshot.
    fields: [client_id, snapshot_date]

  - rule: custom
    name: propensity_score_range_check
    description: >
      propensity_score must be a decimal in the range [0.0, 1.0] inclusive.
      Values outside this range indicate a scoring pipeline error.
    field: propensity_score

  - rule: custom
    name: scoring_distribution_stability
    description: >
      The share of HIGH segment customers must remain between 5% and 40% of total
      scored population per snapshot_date. Significant deviation indicates model
      drift or feature pipeline failure.
    field: segment

  - rule: min_value
    field: propensity_score
    min: 0.0
    description: "Propensity score lower bound is 0.0."

  - rule: max_value
    field: propensity_score
    max: 1.0
    description: "Propensity score upper bound is 1.0."

  - rule: min_value
    field: fuel_txn_count_30d
    min: 0
    description: "Transaction counts must be non-negative."

  - rule: min_value
    field: total_txn_count_90d
    min: 0
    description: "Transaction counts must be non-negative."

  - rule: min_value
    field: days_since_last_insurance
    min: 0
    description: "Days since last insurance must be non-negative."

  - rule: completeness
    field: client_id
    threshold: 100%
    description: >
      Full customer coverage required per snapshot_date. No missing client records
      permitted.

sla:
  availability: 99.5%
  data_latency: "Daily D+1; selected behavioral signals near real-time"
  retention_period: "60 months"

