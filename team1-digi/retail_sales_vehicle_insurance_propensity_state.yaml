dataContractSpecification: 1.1.0
id: urn:nova-banka:datamesh:retail-sales:vehicle-insurance-propensity:state:v1

info:
  title: Retail Sales Vehicle Insurance Propensity State
  name: retail_sales_vehicle_insurance_propensity_state
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Data latency: Daily (D+1); selected behavioral signals near real-time
    Business Entity: Customer / Vehicle Insurance Propensity Profile
    Business Purpose: Customer-level snapshot profile combining behavioral transaction
      features and a propensity score indicating the likelihood of purchasing vehicle
      insurance. Each row represents one client as of a given snapshot_date.
      Supports cross-sell targeting, CRM campaign activation, and ML model scoring
      pipelines within the Retail Sales domain.
    Consumers: Marketing, CRM systems, ML models
    Data Sources: Core banking system (transactions, products), CRM, campaign systems

  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework: "GDPR"

  owner: Nova Banka
  contact:
    name: Xuan Vi Phamová
    email: phax00@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: retail_sales
    table: retail_sales_vehicle_insurance_propensity_state
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
