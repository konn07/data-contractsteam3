dataContractSpecification: 1.1.0
id: urn:nova-banka:datamesh:team3:data-governance-contract-inventory-state
info:
  title: Data Governance Contract Inventory State
  name: Data Governance Contract Inventory State
  product_type: STATE
  maturity_score: 30%
  version: 0.1.0
  status: draft
  description: |
    Centralized metadata inventory of all active Data Contracts across the Nova Banka
    Data Mesh. Captures compliance attributes, PII classification ratios, legal bases,
    product ownership, consumer mappings, and Databricks Unity Catalog paths for every
    registered data product across all business domains. The product is refreshed daily
    via GitHub Actions event-driven synchronization (T+0 intraday for push events),
    ensuring Data Governance, Compliance, and Architecture teams always operate on a
    current view of the mesh's governance posture.
    Data latency: Daily refresh via GitHub Actions; T+0 intraday for push events
    Business Entity:  Data Contract
    Business Purpose: Provide a single authoritative inventory of all registered data
                      contracts for governance oversight, compliance reporting, and
                      mesh-wide PII/legal-basis auditability.
    Consumers:        Data Governance Team, Enterprise Architects, Compliance Officers,
                      Data Stewards, Workshop Mentors
    Data Sources:     bank-data-contracts GitHub repository, individual YAML contract
                      files, Git commit history
  x-regulatory:
    gdpr_relevant: true
    critical_data_element: true
    regulatory_framework: "GDPR"
    data_minimization: "true — only fields strictly necessary to describe a data contract's
      governance posture are captured; no operational or transactional data is stored."
    right_to_erasure: "true — pii_share is a derived ratio metric; no individual personal
      data records are stored, so erasure of a contract entry does not constitute erasure
      of personal data. Product supports right-to-erasure by tracking which contracts hold
      PII so those products can be targeted for erasure workflows."
    purpose_limitation: "true — processing is strictly limited to governance inventory,
      compliance reporting, and audit traceability; no analytical or commercial reuse."
  owner: Nova Banka \ Team3 \ Data Governance & EA
  contact:
    name: Tomáš Kočí
    email: koct03@vse.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: data-governance-prod
    table: data_governance_contract_inventory_state
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: data-governance-dev
    table: data_governance_contract_inventory_state

schema:
  - name: data_governance_contract_inventory_state
    description: >
      One row per registered Data Contract in the Nova Banka Data Mesh. Each row
      represents the current governance snapshot of a single data product, sourced
      from its YAML contract file in the bank-data-contracts GitHub repository.
    fields:
      - name: record_id
        type: string
        description: Unique record identifier (UUID v4) — surrogate key for audit traceability.
        required: true
        unique: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — surrogate key for audit traceability"

      - name: business_date
        type: date
        description: Business processing date on which this snapshot was captured (YYYY-MM-DD).
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — timeliness of risk data reporting"

      - name: region
        type: string
        description: Geographic region of the originating data product [CZ, SK].
        required: true
        enum: [CZ, SK]
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — geographic partitioning"

      - name: product_name
        type: string
        description: >
          The canonical name of the registered data product as defined in its
          Data Contract YAML (info.title). Used as the human-readable identifier
          across governance dashboards and audit reports.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — identifies the governed asset by name"

      - name: domain
        type: string
        description: >
          The business domain to which the data product belongs
          (e.g. Risk, Finance, Client Service, Data Governance & EA).
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — data ownership and domain accountability for risk data"

      - name: pii_share
        type: double
        description: >
          Ratio of PII-tagged fields to total fields in the data product schema,
          expressed as a decimal between 0.0 and 1.0. Derived from x-compliance.is_pii
          annotations in the contract YAML. Sensitive because it reveals the PII
          exposure profile of a data product domain.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Confidential
          regulatory_basis: "GDPR Art. 5(1)(f) — integrity and confidentiality; Art. 30 — records of processing activities"

      - name: legal_basis
        type: string
        description: >
          The predominant GDPR legal basis declared for PII fields in the data product
          (e.g. Contractual, Consent, Legal Obligation, Legitimate Interest).
          Populated from x-compliance.legal_basis of PII-tagged fields.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "GDPR Art. 6 — lawfulness of processing; Art. 30 — records of processing activities"

      - name: consumers
        type: string
        description: >
          Comma-separated list of downstream consumer systems or teams as declared
          in the data contract's x-dawiso.data_product.lineage.downstream section.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — data lineage and consumer traceability"

      - name: last_modified
        type: timestamp
        description: >
          Timestamp of the most recent Git commit that modified the contract YAML file,
          sourced from Git commit history. Used to detect stale contracts and trigger
          governance review workflows.
        required: true
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "BCBS 239 — data lineage; GDPR Art. 5(2) — accountability (audit trail of governance changes)"

      - name: databricks_path
        type: string
        description: >
          Fully qualified Databricks Unity Catalog path for the data product table
          (catalog.schema.table). Sourced from the servers block of the contract YAML.
        required: false
        x-compliance:
          is_pii: false
          sensitivity: Internal
          regulatory_basis: "Internal governance — technical lineage pointer for Unity Catalog discoverability"

quality:
  - rule: not_null
    field: record_id
  - rule: unique
    field: record_id
  - rule: not_null
    field: product_name
  - rule: not_null
    field: domain
  - rule: not_null
    field: last_modified
  - rule: not_null
    field: business_date
  - rule: row_count
    min: 10
    max: 5000
    description: >
      Detects data distribution anomalies (volume drop/spike). Row count must match
      the number of active contracts registered in the bank-data-contracts GitHub
      repository. A count below 10 indicates a pipeline failure or mass deletion event;
      a count above 5000 indicates a duplication anomaly.
  - rule: accepted_values
    field: region
    values: [CZ, SK]
  - rule: range
    field: pii_share
    min: 0.0
    max: 1.0
    description: "PII share must be a valid ratio between 0.0 and 1.0"
  - rule: schema_validity
    description: "100% of ingested YAML contract files must pass schema validation before loading"

sla:
  availability: 99.5%
  data_latency: "Daily batch refresh via GitHub Actions; T+0 intraday for push events"
  retention_period: 60 months

x-dawiso:
  data_product:
    dawiso_status: design
    domain: Data Governance & EA
    business_owner: Head of Data Governance
    product_owner: Tomáš Kočí — koct03@vse.cz
    data_steward: Tomáš Kočí — koct03@vse.cz
    tags:
      - data-governance
      - state-product
      - compliance
      - contract-inventory
    classification: "Governance Data Product"
    data_classification: Confidential
    lineage:
      upstream:
        - name: bank-data-contracts GitHub repository
          type: internal-system
          description: "Source of all Data Contract YAML files; provides product_name,
            domain, pii_share, legal_basis, consumers, and databricks_path via
            file parsing."
        - name: Git commit history
          type: internal-system
          description: "Provides last_modified timestamps per contract file, enabling
            staleness detection and audit trail reconstruction."
      downstream:
        - name: Data Governance Dashboard
          type: data-product
          description: "Consumes the inventory to render mesh-wide PII coverage,
            legal-basis distribution, and contract maturity KPIs for governance
            reporting."
        - name: Compliance Reporting Engine
          type: data-product
          description: "Uses pii_share and legal_basis fields to generate GDPR Art. 30
            records-of-processing reports and BCBS 239 data lineage attestations."
        - name: Enterprise Architecture Repository
          type: data-product
          description: "Uses domain, consumers, and databricks_path to maintain an
            up-to-date map of the Nova Banka Data Mesh topology."
    rules_ko:
      - "record_id must be a valid UUID v4"
      - "Volume must be within expected range (10–5000 rows)"
      - "pii_share must be a decimal in [0.0, 1.0]"
      - "All mandatory fields (record_id, product_name, domain, last_modified, business_date) must be not null"
      - "100% of source YAML files must pass schema validation before ingestion"
    retention:
      period: "60 months"
      rationale: >
        GDPR Art. 5(2) accountability obligation requires organisations to demonstrate
        compliance throughout the lifecycle of data processing activities. A 60-month
        retention aligns with Nova Banka's internal audit cycle (5 years) and ensures
        that historical governance posture can be reconstructed for regulatory
        examinations, DPA inquiries, or internal audit reviews.

    regulatory_mapping:
      - regulation: BCBS 239
        status: Contributes
        reason: >
          The inventory tracks data lineage (upstream/downstream), ownership, and
          data quality metrics (schema validity, row count) for every registered
          product, directly supporting the BCBS 239 requirements for data lineage,
          data quality, and risk data aggregation governance.
      - regulation: BASEL IV
        status: N/A
        reason: >
          This product contains governance metadata only; it does not hold RWA
          calculations, capital adequacy inputs, or credit risk model outputs
          required under Basel IV.
      - regulation: EBA
        status: Contributes
        reason: >
          The product supports EBA data governance guidelines by providing a
          structured inventory of data ownership, stewardship, and domain
          accountability across the Nova Banka Data Mesh.
      - regulation: DORA
        status: Contributes
        reason: >
          The SLA (99.5% availability, T+0 intraday latency) and retention policy
          document data resilience and recoverability posture, contributing to DORA
          requirements for ICT risk management and data availability continuity.
      - regulation: AML
        status: N/A
        reason: >
          The product contains no transaction monitoring data, KYC attributes, or
          customer identity information. It does not contribute to or restrict AML
          obligations.
      - regulation: MiFID II
        status: N/A
        reason: >
          No capital markets, trade reporting, or investment service data is present.
          MiFID II transaction reporting obligations are not applicable.
      - regulation: PSD2
        status: N/A
        reason: >
          No payment services, open banking API, or payment account data is present.
          PSD2 obligations are not applicable.
      - regulation: GDPR
        status: Both
        reason: >
          Contributes — the inventory tracks PII classification ratios (pii_share)
          and legal bases across all data products, supporting GDPR Art. 30 records-of-
          processing obligations and enabling mesh-wide data minimisation audits.
          Restricts — the product itself is subject to GDPR accountability (Art. 5(2)),
          purpose limitation, and a 60-month retention mandate tied to the
          accountability obligation.
      - regulation: AI Act
        status: Contributes
        reason: >
          The inventory can serve as a data quality and provenance metadata source
          for AI governance workflows that assess training data compliance. It is not
          itself an AI system input in the current version, but its schema validity
          and PII tagging metadata are referenced in AI Act readiness assessments.
      - regulation: IFRS 9
        status: N/A
        reason: >
          No ECL model outputs, financial instrument staging, or credit loss data
          is present. IFRS 9 obligations are not applicable.

    ai_act:
      is_ai_input: false
      is_ai_output: false
      high_risk_classification: false
      fria_required: false
      fria_notes: >
        This product is a governance metadata inventory of data contracts. It is not
        used as direct training data or inference input for any AI/ML model, and is
        not produced by an AI system. No natural persons are subject to automated
        decision-making based on this product. Therefore, no Fundamental Rights
        Impact Assessment is required under the EU AI Act. If future use cases
        introduce automated compliance scoring or AI-driven contract validation,
        this assessment must be revisited.

  glossary_entry:
    term: "Data Governance Data Contract"
    definition: >
      A formal, machine-readable agreement that defines the schema, ownership,
      quality rules, SLA, and regulatory compliance posture of a data product
      within the Nova Banka Data Mesh, serving as the authoritative governance
      artifact for a single business dataset.
    fibo_class: "fibo-fnd-agr-agr:Agreement"
    fibo_uri: "https://spec.edmcouncil.org/fibo/ontology/FND/Agreements/Agreements/Agreement"
    domain: Data Governance & EA
    dawiso_status: draft
    steward: Tomáš Kočí — koct03@vse.cz
    synonyms:
      - Datový kontrakt
      - Smlouva o datech
    acronyms:
      - DC
    related_capability: "Data Contract Management"
    related_terms:
      - "Data Product"
      - "Data Mesh"
      - "PII Classification"
      - "Data Lineage"
      - "Data Quality Rule"
      - "Unity Catalog"
