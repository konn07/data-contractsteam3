dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:corporate-banking:credit-risk-credit-memo
info:
  title: DP_CREDIT_RISK_CREDIT_MEMO
  name: Credit Risk Credit Memo
  maturity_score: 20%
  version: 0.1.0
  status: draft
  description: 'Datový produkt obsahuje strukturovaná data úvěrových memorand (Credit
    Memos)

    generovaných multi-agentním GenAI systémem (Maker Agent, Checker Agent, Data Agent).

    Zahrnuje extrahovaná data z Core Banking System, ARES/ISZR, Justice.cz a

    Insolvenčního rejstříku pro každý korporátní úvěrový případ (IČO).

    Data latency: Per request / ad-hoc + denní EOD refresh


    Filter Rules:

    * Pouze záznamy s platným client_ico (8místné IČO)

    * Pouze záznamy se statusem credit_memo_status IN [draft, review, approved, rejected]

    * Region musí být CZ nebo SK


    Use Cases:

    * UC1 - Automatizovaná tvorba draft Credit Mema pro underwriting tým

    * UC2 - Strukturování a agregace klientských dat z externích rejstříků

    * UC3 - Podpora rozhodovacího procesu s Human-in-the-loop kontrolou

    * UC4 - Auditní stopa schvalovacího procesu

    '
  owner: Nova Banka \ Team7 \ Corporate Banking \ Underwriting
  contact:
    name: Nikita Zverev
    email: zven01@vse.cz
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: corporate-banking-prod
    table: dp_credit_risk_credit_memo
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: corporate-banking-dev
    table: dp_credit_risk_credit_memo
schema:
- name: dp_credit_risk_credit_memo
  description: Tabulka úvěrových memorand generovaných GenAI systémem pro korporátní
    úvěrování
  fields:
  - name: record_id
    type: string
    description: Unikátní identifikátor záznamu (UUID)
    required: true
    unique: true
    example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: case_id
    type: string
    description: Unikátní identifikátor úvěrového případu
    required: true
    example: CASE-2024-00123
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: client_ico
    type: string
    description: IČO klienta (8místný identifikátor firmy, zdroj ARES/ISZR)
    required: true
    example: '12345678'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: client_name
    type: string
    description: Obchodní jméno klienta
    required: true
    example: Novák s.r.o.
    x-compliance:
      is_pii: true
      sensitivity: Confidential
      legal_basis: Contractual
  - name: region
    type: string
    description: Region klienta - povolené hodnoty CZ nebo SK
    required: true
    enum:
    - CZ
    - SK
    example: CZ
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: credit_memo_status
    type: string
    description: Aktuální stav úvěrového memoranda
    required: true
    enum:
    - draft
    - review
    - approved
    - rejected
    example: draft
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: risk_rating
    type: string
    description: Rizikový rating klienta přidělený systémem
    required: false
    example: BB+
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: credit_score
    type: decimal
    description: Kreditní skóre klienta (0.00 - 100.00)
    required: false
    example: 72.5
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: requested_exposure_amount
    type: decimal
    description: Požadovaná výše úvěrové expozice
    required: true
    example: 15000000.0
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: currency
    type: string
    description: Měna expozice - ISO 4217 kód
    required: true
    example: CZK
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: collateral_type
    type: string
    description: Typ zajištění (Collateral)
    required: false
    example: Nemovitost
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: collateral_value
    type: decimal
    description: Hodnota zajištění
    required: false
    example: 20000000.0
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: insolvency_flag
    type: boolean
    description: Příznak záznamu v Insolvenčním rejstříku (zdroj justice.cz)
    required: true
    example: false
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: ownership_structure_json
    type: string
    description: Vlastnická struktura klienta ve formátu JSON (zdroj ARES/ISZR)
    required: false
    example: '{"owner": "Jan Novák", "share": "100%"}'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: financial_statement_year
    type: integer
    description: Rok posledního dostupného finančního výkazu (zdroj Justice.cz)
    required: false
    example: 2023
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: maker_agent_version
    type: string
    description: Verze Maker Agenta, který vygeneroval draft memorandum
    required: true
    example: maker-agent-v1.2.0
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: checker_agent_approved
    type: boolean
    description: Příznak schválení Checker Agentem před předáním underwriterovi
    required: true
    example: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: human_reviewer_id
    type: string
    description: ID underwritera, který provedl finální Human-in-the-loop revizi
    required: false
    example: UW-007
    x-compliance:
      is_pii: true
      sensitivity: Confidential
      legal_basis: Contractual
  - name: business_date
    type: date
    description: Datum zpracování případu (YYYY-MM-DD)
    required: true
    example: '2024-06-15'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: created_at
    type: timestamp
    description: Čas vytvoření záznamu
    required: true
    example: '2024-06-15T08:30:00Z'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: updated_at
    type: timestamp
    description: Čas poslední aktualizace záznamu
    required: true
    example: '2024-06-15T14:45:00Z'
    x-compliance:
      is_pii: false
      sensitivity: Internal
sources:
- name: Core Banking System (CBS)
  type: internal
  description: Transakce, expozice, limity klienta
  freshness: Denní EOD refresh
  owner: Tým 8
- name: ARES / ISZR
  type: external
  description: Identifikace firmy, vlastnická struktura
  freshness: Denní refresh
- name: Justice.cz
  type: external
  description: Finanční výkazy klienta
  freshness: Denní refresh
- name: Insolvenční rejstřík
  type: external
  description: Záznamy o insolvenci a právní rizika
  freshness: Denní refresh
quality:
- rule: not_null
  field: record_id
  description: ID záznamu nesmí být prázdné
- rule: unique
  field: record_id
  description: Každý záznam musí mít unikátní ID
- rule: not_null
  field: case_id
  description: ID úvěrového případu nesmí být prázdné
- rule: not_null
  field: client_ico
  description: IČO klienta nesmí být prázdné
- rule: regex
  field: client_ico
  pattern: ^[0-9]{8}$
  description: IČO musí mít přesně 8 číslic
- rule: accepted_values
  field: region
  values:
  - CZ
  - SK
  description: Region musí být CZ nebo SK
- rule: accepted_values
  field: credit_memo_status
  values:
  - draft
  - review
  - approved
  - rejected
  description: Status memoranda musí být jedna z povolených hodnot
- rule: not_null
  field: requested_exposure_amount
  description: Výše expozice nesmí být prázdná
- rule: not_null
  field: business_date
  description: Datum zpracování nesmí být prázdné
- rule: not_null
  field: checker_agent_approved
  description: Výsledek kontroly Checker Agenta nesmí být prázdný
sla:
  availability: 99.0%
  data_latency: Per request (ad-hoc) + D+0 EOD
  retention_period: 84 months
  support_contact: zven01@vse.cz
terms:
  usage: 'Interní použití pro korporátní underwriting a credit risk management.

    Určeno pro Underwriting tým, Risk tým a Legal systém.

    Vhodné pro generování Credit Mem, auditní stopu a reportování.

    '
  limitations: 'Není určeno pro real-time použití — data jsou dostupná per request
    (ad-hoc) + EOD refresh.

    Přístup je omezen na autorizované role (Underwriting, Risk Management, Legal).

    Data nesmí být použita mimo schválené use cases bez souhlasu Data Product Ownera.

    Finální rozhodnutí o úvěru vždy zůstává na lidském underwriterovi (Human-in-the-loop).

    '
  noticePeriod: P3M
servicelevels:
  freshness:
    description: Per request (ad-hoc) pro nové případy + denní EOD refresh pro dávkové
      zpracování.
  availability:
    description: 99.0% dostupnost pro Underwriting tým a Risk Management.
  latency:
    description: Data dostupná v rámci EOD dávkového okna nebo do 15 minut od ad-hoc
      requestu.
x-data-product:
  classification: Operational & Analytical Data Product
  domain: Corporate Banking
  domainOwner: Head of Corporate Banking Underwriting
  consumers:
  - Underwriting tým
  - Risk tým (CRO)
  - Legal systém
  - AML/KYC oddělení
  delivery:
    platform: Bank Data Lake / Databricks
    accessChannels:
    - Multi-agentní AI systém (Maker, Checker, Data Agent)
    - Interní data katalog
    - Kontrolovaný export pro audit
    metadata: Interní data katalog Nova Banky
  lineage:
    upstream:
    - name: Core Banking System (CBS)
      type: internal-system
      owner: Tým 8
      description: Transakce, expozice, limity klienta
    - name: ARES / ISZR
      type: external-registry
      description: Identifikace firmy, vlastnická struktura
    - name: Justice.cz
      type: external-registry
      description: Finanční výkazy klienta
    - name: Insolvenční rejstřík
      type: external-registry
      description: Záznamy o insolvenci a právní rizika
    downstream:
    - name: Proactive Early Warning Radar
      type: data-product
      id: urn:businessdomain:nova-banka:corporate-banking:proactive-early-warning-radar
  rules_ko:
  - IČO klienta musí být validní 8místné číslo.
  - Checker Agent musí schválit memorandum před předáním underwriterovi.
  - Každý případ musí mít auditní stopu (maker_agent_version, human_reviewer_id).
  retention:
    description: Úvěrová memoranda jsou uchovávána 84 měsíců z důvodu regulatorních
      požadavků.
  governance:
    accessControl: Role-based access pro Underwriting, Risk Management a Legal.
    humanInTheLoop: Finální schválení úvěrového memoranda vždy provádí lidský underwriter.
