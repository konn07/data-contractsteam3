dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:corporate-banking:proactive-early-warning-radar
info:
  title: DP_PROACTIVE_EARLY_WARNING_RADAR
  name: Proactive Early Warning Radar
  maturity_score: 20%
  version: 0.1.0
  status: draft
  description: 'Datový produkt obsahuje early-warning alerty a next-best-action doporučení

    generovaná Data Agentem na základě kontinuálního monitoringu makroekonomických
    dat,

    zpráv (Insolvenční rejstřík, zpravodajství) a Core Banking System.

    Cílem je proaktivní identifikace rizik v úvěrovém portfoliu dříve,

    než klient přestane splácet — ochrana kapitálu a snížení Probability of Default
    (PD).

    Data latency: Streaming (tržní/zpravodajská data) + D+0 EOD (bankovní data)


    Filter Rules:

    * Pouze záznamy s platným client_ico (8místné IČO)

    * Pouze aktivní alerty (alert_status != ''closed'') nebo uzavřené alerty za posledních
    12 měsíců

    * Region musí být CZ nebo SK


    Use Cases:

    * UC1 - Proaktivní monitoring úvěrového portfolia pro Risk tým a CRO

    * UC2 - Generování early-warning alertů při detekci rizikového triggeru

    * UC3 - Next-best-action doporučení (mitigace, eskalace, žádost o zajištění)

    * UC4 - Podpora Portfolio Management dashboardu (Tableau / Power BI)

    * UC5 - Sdílení strukturovaných dat s AML/KYC a interním výzkumem

    '
  owner: Nova Banka \ Team7 \ Corporate Banking \ Risk Monitoring
  contact:
    name: Nikita Zverev
    email: zven01@vse.cz
servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: corporate-banking-prod
    table: dp_proactive_early_warning_radar
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: corporate-banking-dev
    table: dp_proactive_early_warning_radar
schema:
- name: dp_proactive_early_warning_radar
  description: Tabulka early-warning alertů a next-best-action doporučení pro úvěrové
    portfolio
  fields:
  - name: record_id
    type: string
    description: Unikátní identifikátor záznamu (UUID)
    required: true
    unique: true
    example: f9e8d7c6-b5a4-3210-fedc-ba9876543210
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: alert_id
    type: string
    description: Unikátní identifikátor early-warning alertu
    required: true
    unique: true
    example: EWA-2024-00456
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: client_ico
    type: string
    description: IČO klienta (8místný identifikátor firmy)
    required: true
    example: '87654321'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: client_name
    type: string
    description: Obchodní jméno klienta
    required: true
    example: Průmysl a.s.
    x-compliance:
      is_pii: true
      sensitivity: Confidential
      legal_basis: Contractual
  - name: region
    type: string
    description: Region klienta - povolené hodnoty CZ nebo SK
    required: true
    enum:
    - CZ
    - SK
    example: CZ
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: alert_status
    type: string
    description: Aktuální stav alertu
    required: true
    enum:
    - open
    - under_review
    - actioned
    - closed
    - false_positive
    example: open
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: alert_severity
    type: string
    description: Závažnost alertu
    required: true
    enum:
    - low
    - medium
    - high
    - critical
    example: high
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: trigger_type
    type: string
    description: Typ trigger události, která alert vyvolala
    required: true
    enum:
    - insolvency_filing
    - news_signal
    - macro_indicator
    - cbs_limit_breach
    - rating_downgrade
    example: insolvency_filing
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: trigger_source
    type: string
    description: Zdroj dat, ze kterého byl trigger detekován
    required: true
    enum:
    - insolvency_registry
    - seznam_cz
    - novinky_cz
    - cnb_macro
    - core_banking_system
    example: insolvency_registry
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: trigger_description
    type: string
    description: Textový popis trigger události
    required: true
    example: Podán insolvenční návrh na klienta dne 2024-06-10
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: probability_of_default
    type: decimal
    description: Pravděpodobnost selhání klienta (0.0000 - 1.0000)
    required: false
    example: 0.185
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: portfolio_exposure_amount
    type: decimal
    description: Aktuální výše expozice klienta v portfoliu
    required: true
    example: 8500000.0
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: currency
    type: string
    description: Měna expozice - ISO 4217 kód
    required: true
    example: CZK
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: next_best_action
    type: string
    description: Doporučená next-best-action generovaná AI agentem
    required: false
    enum:
    - escalate_to_cro
    - request_additional_collateral
    - schedule_client_meeting
    - monitor_only
    - initiate_mitigation
    - flag_for_aml_kyc
    example: escalate_to_cro
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: next_best_action_description
    type: string
    description: Detailní textový popis doporučeného kroků pro Portfolio manažera
    required: false
    example: Eskalovat případ na CRO z důvodu podaného insolvenčního návrhu. Doporučeno
      zahájit restrukturalizaci expozice.
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: macro_indicator_name
    type: string
    description: Název makroekonomického ukazatele ČNB (pokud trigger_source = cnb_macro)
    required: false
    example: Inflace_CPI
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: macro_indicator_value
    type: decimal
    description: Hodnota makroekonomického ukazatele
    required: false
    example: 3.2
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: alert_actioned_by
    type: string
    description: ID Portfolio manažera nebo Risk pracovníka, který alert zpracoval
    required: false
    example: RM-042
    x-compliance:
      is_pii: true
      sensitivity: Confidential
      legal_basis: Contractual
  - name: alert_action_taken
    type: string
    description: Popis akce skutečně provedené po alertu (pro výpočet Hit Rate)
    required: false
    example: Eskalováno na CRO, zahájena restrukturalizace
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: is_hit
    type: boolean
    description: Příznak, zda alert vedl k reálné preventivní akci (pro metriku Early
      Warning Hit Rate)
    required: false
    example: true
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: data_agent_version
    type: string
    description: Verze Data Agenta, který alert vygeneroval
    required: true
    example: data-agent-v1.1.0
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: event_timestamp
    type: timestamp
    description: Čas detekce trigger události (streaming)
    required: true
    example: '2024-06-10T09:15:00Z'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: business_date
    type: date
    description: Datum záznamu ve formátu YYYY-MM-DD
    required: true
    example: '2024-06-10'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: created_at
    type: timestamp
    description: Čas vytvoření záznamu v datovém produktu
    required: true
    example: '2024-06-10T09:16:00Z'
    x-compliance:
      is_pii: false
      sensitivity: Internal
  - name: updated_at
    type: timestamp
    description: Čas poslední aktualizace záznamu
    required: true
    example: '2024-06-11T08:00:00Z'
    x-compliance:
      is_pii: false
      sensitivity: Internal
sources:
- name: Insolvenční rejstřík
  type: external
  description: Záznamy o insolvenci a právní rizika klientů
  freshness: Denní refresh (streaming detekce)
- name: Zpravodajství (Seznam.cz, Novinky.cz)
  type: external
  description: Mediální signály o klientech a odvětvích
  freshness: Kontinuální streaming
- name: ČNB (makroekonomická data)
  type: external
  description: Makroekonomické ukazatele České národní banky
  freshness: Denní EOD refresh
- name: Core Banking System (CBS)
  type: internal
  description: Limity a expozice klientů v portfoliu
  freshness: Denní EOD refresh
  owner: Tým 8
quality:
- rule: not_null
  field: record_id
  description: ID záznamu nesmí být prázdné
- rule: unique
  field: record_id
  description: Každý záznam musí mít unikátní ID
- rule: unique
  field: alert_id
  description: Každý alert musí mít unikátní ID
- rule: not_null
  field: client_ico
  description: IČO klienta nesmí být prázdné
- rule: regex
  field: client_ico
  pattern: ^[0-9]{8}$
  description: IČO musí mít přesně 8 číslic
- rule: accepted_values
  field: region
  values:
  - CZ
  - SK
  description: Region musí být CZ nebo SK
- rule: accepted_values
  field: alert_status
  values:
  - open
  - under_review
  - actioned
  - closed
  - false_positive
  description: Status alertu musí být jedna z povolených hodnot
- rule: accepted_values
  field: alert_severity
  values:
  - low
  - medium
  - high
  - critical
  description: Závažnost alertu musí být jedna z povolených hodnot
- rule: accepted_values
  field: trigger_type
  values:
  - insolvency_filing
  - news_signal
  - macro_indicator
  - cbs_limit_breach
  - rating_downgrade
  description: Typ triggeru musí být jedna z povolených hodnot
- rule: not_null
  field: portfolio_exposure_amount
  description: Výše expozice nesmí být prázdná
- rule: range
  field: probability_of_default
  min: 0.0
  max: 1.0
  description: PD musí být hodnota mezi 0.0 a 1.0
- rule: not_null
  field: event_timestamp
  description: Čas trigger události nesmí být prázdný
- rule: not_null
  field: business_date
  description: Datum záznamu nesmí být prázdné
sla:
  availability: 99.5%
  data_latency: Streaming (real-time triggery) + D+0 EOD (bankovní data)
  retention_period: 60 months
  support_contact: zven01@vse.cz
terms:
  usage: 'Interní použití pro proaktivní monitoring úvěrového portfolia a řízení kreditního
    rizika.

    Určeno pro Risk tým (CRO), Portfolio Management, AML/KYC oddělení a interní výzkum.

    Vhodné pro BI dashboardy (Tableau / Power BI) a kontrolované datové exporty.

    '
  limitations: 'Není určeno pro real-time rozhodování bez lidské supervize.

    Přístup je omezen na autorizované role (Risk Management, Portfolio Management,
    AML/KYC).

    Data nesmí být použita k identifikaci fyzických osob — pouze korporátní profilování
    (IČO).

    Early-warning alerty jsou doporučení systému, finální akce provádí lidský Risk
    manažer.

    '
  noticePeriod: P3M
servicelevels:
  freshness:
    description: Kontinuální streaming pro zpravodajství a insolvenční rejstřík. Denní
      EOD refresh pro bankovní a makroekonomická data.
  availability:
    description: 99.5% dostupnost pro Risk tým, CRO a Portfolio Management.
  latency:
    description: Streaming triggery dostupné do 15 minut od detekce události. Bankovní
      data dostupná v rámci EOD dávkového okna.
x-data-product:
  classification: Analytical & Operational Data Product
  domain: Corporate Banking
  domainOwner: Head of Corporate Banking Risk Monitoring
  consumers:
  - Risk tým (CRO)
  - Portfolio Management
  - AML/KYC oddělení
  - Interní výzkum
  - Tým Strategie (strategické KPI)
  delivery:
    platform: Bank Data Lake / Databricks
    accessChannels:
    - Portfolio Management dashboard (Tableau / Power BI)
    - Interní data katalog
    - Kontrolovaný export pro audit a AML/KYC
    metadata: Interní data katalog Nova Banky
  lineage:
    upstream:
    - name: Core Banking System (CBS)
      type: internal-system
      owner: Tým 8
      description: Limity a expozice klientů v portfoliu
    - name: Credit Risk Credit Memo
      type: data-product
      id: urn:businessdomain:nova-banka:corporate-banking:credit-risk-credit-memo
      description: Strukturovaná klientská data z underwritingu jako vstup pro monitoring
    - name: Insolvenční rejstřík
      type: external-registry
      description: Záznamy o insolvenci a právní rizika klientů
    - name: Zpravodajství (Seznam.cz, Novinky.cz)
      type: external-feed
      description: Mediální signály o klientech a odvětvích
    - name: ČNB (makroekonomická data)
      type: external-registry
      description: Makroekonomické ukazatele České národní banky
    downstream:
    - name: Strategy KPI Aggregation
      type: data-product
      description: Strategické metriky banky využívající early-warning data
  rules_ko:
  - IČO klienta musí být validní 8místné číslo.
  - Každý alert musí mít identifikovatelný trigger_type a trigger_source.
  - Probability of Default musí být v rozsahu 0.0 - 1.0.
  - Alerty musí projít validací před distribucí do dashboardů.
  retention:
    description: Early-warning alerty jsou uchovávány 60 měsíců pro účely audit trail
      a zpětné analýzy Hit Rate.
  governance:
    accessControl: Role-based access pro Risk Management, Portfolio Management a AML/KYC.
    humanInTheLoop: Finální akce (eskalace, mitigace) vždy provádí lidský Risk manažer
      nebo CRO.
