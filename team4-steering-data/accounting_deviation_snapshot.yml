dataContractSpecification: 1.1.0
id: urn:datacontract:nova-banka:accounting:gl-deviation-snapshot-state:0.1.0
info:
title: Accounting Deviation Snapshot
name: Accounting GL Deviation Snapshot STATE
product\_type: STATE
maturity\_score: 30%
version: 0.1.0
status: draft
description: |
Datový produkt slouží k vyřešení deviací mezi zůstatky hlavní knihy (GL) a klientskými daty. Zajišťuje bezchybný reporting mateřské společnosti, včasnou detekci chyb a důvěryhodnost finančních výkazů.
Data latency: T+1
Business Entity: General Ledger Account
Business Purpose: Reconciliation of GL and client data for Head Office reporting
Consumers: Head Office (matka), Data Stewardi, Účetnictví
Data Sources: Transakční systémy, Tým 3: Obsluha klienta

x-regulatory:
gdpr\_relevant: false
critical\_data\_element: true
regulatory\_framework: "IFRS 9"

owner: Nova Banka \\ Team 4: Steering Data \\ Accounting
contact:
name: Josef Kuník
email: josef.kunik@nova-banka.cz

servers:
PRODUCTION:
type: databricks
host: nova-banka-prod.cloud.databricks.com
environment: production
catalog: datamesh-nova-banka-prod
schema: accounting-prod
table: gl\_deviation\_snapshot
DEVELOPMENT:
type: databricks
host: nova-banka-dev.cloud.databricks.com
environment: development
catalog: datamesh-nova-banka-dev
schema: accounting-dev
table: gl\_deviation\_snapshot

schema:

  - name: gl\_deviation\_snapshot
    description: Snapshot of GL account balances and calculated deviations in CZK
    fields:
      - name: record\_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: business\_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: GLBAL\_DATE
        type: date
        description: General Ledger balance date
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: DOM\_GCOA
        type: string
        description: Global Chart of Accounts (GCOA) account identifier
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: WORK\_BAL
        type: double
        description: Working balance amount
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: AVG\_WORK\_BAL
        type: double
        description: Average working balance amount
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: GLBAL\_AMOUNT\_CZK
        type: double
        description: General Ledger balance amount in CZK
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: AVG\_GLBAL\_AMOUNT\_CZK
        type: double
        description: Average General Ledger balance amount in CZK
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: VD5\_BAL
        type: double
        description: VD5 balance amount
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: VD5\_BAL\_AVG
        type: double
        description: Average VD5 balance amount
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: DIFF\_BAL\_CALC
        type: double
        description: Calculated difference balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

      - name: AVG\_DIFF\_BAL\_CALC
        type: double
        description: Average calculated difference balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

quality:

  - rule: not\_null
    field: record\_id

  - rule: unique
    field: record\_id

  - rule: row\_count
    min: 1000
    max: 50000
    description: "Detects data distribution anomalies (volume drop/spike) for GCOA deviation reporting"

  - rule: accepted\_values
    field: region
    values: [CZ, SK]

sla:
availability: 99.5%
data\_latency: T+1
retention\_period: 12 months

