dataContractSpecification: 1.1.0
id: urn:horizon:accounting:deviation-snapshot
info:
title: Accounting Deviation Snapshot
name: Accounting Deviation Snapshot
product\_type: STATE
maturity\_score: 30%
version: 0.1.0
status: draft
description: |
Resolves deviations between the general ledger (GL) and client data. Ensures error-free reporting to the parent company, early error detection, and maintains the credibility of financial statements.
Data latency: Monthly
Business Entity: Accounting
Business Purpose: General Ledger to Client Data Reconciliation and Head Office Reporting
Consumers: Head Office (Parent Company), Data Stewards, Accounting
Data Sources: Transaction systems (Team 3: Client Service), General Ledger

x-regulatory:
gdpr\_relevant: false
critical\_data\_element: true
regulatory\_framework: "BCBS 239"
\# NEW v3.3 — Extended GDPR fields
data\_minimization: "true"
right\_to\_erasure: "false"
purpose\_limitation: "true"

owner: Horizon AI Bank \\ Team 4 \\ Accounting
contact:
name: Josef Kuník
email: josef.kunik@nova-banka.cz

servers:
PRODUCTION:
type: databricks
host: nova-banka-prod.cloud.databricks.com
environment: production
catalog: datamesh-nova-banka-prod
schema: accounting-prod
table: accounting\_deviation\_snapshot
DEVELOPMENT:
type: databricks
host: nova-banka-dev.cloud.databricks.com
environment: development
catalog: datamesh-nova-banka-dev
schema: accounting-dev
table: accounting\_deviation\_snapshot

schema:

  - name: accounting\_deviation\_snapshot
    description: Snapshot of financial deviations mapped by GCOA (Group Chart of Accounts) in CZK.
    fields:

      - name: record\_id
        type: string
        description: Unique record identifier (UUID v4)
        required: true
        unique: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal

        # NEW v3.3 — regulatory justification for this field's existence

        regulatory\_basis: "Internal governance — surrogate key for audit traceability"

      - name: business\_date
        type: date
        description: Business processing date (YYYY-MM-DD)
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — timeliness of risk data reporting"

      - name: region
        type: string
        description: Geographic region [CZ, SK]
        required: true
        enum: [CZ, SK]
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "Internal governance — geographic partitioning"

    # \--- Business fields with Compliance tags ---

      - name: glbal\_date
        type: date
        description: General Ledger Balance Date
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — accurate risk aggregation and reporting timeliness"

      - name: dom\_gcoa
        type: string
        description: Group Chart of Accounts identifier
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "IFRS 9 — financial mapping and aggregation requirements"

      - name: work\_bal
        type: number
        description: Working Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "Internal governance — financial reconciliation"

      - name: avg\_work\_bal
        type: number
        description: Average Working Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "Internal governance — financial reconciliation"

      - name: glbal\_amount\_czk
        type: number
        description: General Ledger Balance Amount in CZK
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — financial accuracy"

      - name: avg\_glbal\_amount\_czk
        type: number
        description: Average General Ledger Balance Amount in CZK
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — financial accuracy"

      - name: vd5\_bal
        type: number
        description: VD5 Source Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "Internal governance — source system tracking"

      - name: vd5\_bal\_avg
        type: number
        description: Average VD5 Source Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "Internal governance — source system tracking"

      - name: diff\_bal\_calc
        type: number
        description: Calculated Difference (Deviation) Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — risk and deviation reporting"

      - name: avg\_diff\_bal\_calc
        type: number
        description: Calculated Average Difference (Deviation) Balance
        required: true
        x-compliance:
        is\_pii: false
        sensitivity: Internal
        regulatory\_basis: "BCBS 239 — risk and deviation reporting"

quality:

  - rule: not\_null
    field: record\_id
  - rule: unique
    field: record\_id

# Distribution & Volume check (Mentor requirement)

  - rule: row\_count
    min: 100
    max: 15000
    description: "Detects data distribution anomalies (volume drop/spike) based on expected GCOA account counts"

  - rule: accepted\_values
    field: region
    values: [CZ, SK]

sla:
availability: 99.5%
data\_latency: Monthly
retention\_period: 12 months

