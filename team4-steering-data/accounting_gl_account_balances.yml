dataContractSpecification: 1.1.0
id: urn:businessdomain:nova-banka:finance:accounting-gl-account-balances

info:
  title: DP_ACCOUNTING_GL_ACCOUNT_BALANCES
  name: Accounting GL Account Balances
  maturity_score: 60%
  version: 1.0.0
  status: in development
  description: |
    Data produkt poskytuje sjednocený pohled na zůstatky hlavní knihy s vazbou na GCOA.
    Konzumenti: Steering data, BI, Controlling, Management.
    Data latency: T+1
    Use Cases:
    * UC1 - Podklad pro datovou rekonciliaci
    * UC2 - Výpočet celkové bilance banky
    * UC3 - Finanční controlling a Head Office reporting
  owner: Nova Banka \ Finance a Účetnictví \ Tým 4
  contact:
    name: Josef Kuník
    email: josef.kunik@nova-banka.cz

servers:
  PRODUCTION:
    type: databricks
    host: nova-banka-prod.cloud.databricks.com
    environment: production
    catalog: datamesh-nova-banka-prod
    schema: finance-prod
    table: dp_accounting_gl_account_balances
  DEVELOPMENT:
    type: databricks
    host: nova-banka-dev.cloud.databricks.com
    environment: development
    catalog: datamesh-nova-banka-dev
    schema: finance-dev
    table: dp_accounting_gl_account_balances

schema:
  - name: dp_accounting_gl_account_balances
    description: Denní zůstatky hlavní knihy (EOD)
    fields:
      - name: record_id
        type: string
        description: Unikátní identifikátor záznamu (UUID)
        required: true
        unique: true
      - name: business_date
        type: date
        description: Datum záznamu ve formátu YYYY-MM-DD
        required: true
      - name: lcoa_account
        type: string
        description: Číslo účtu v lokální účetní osnově (LCOA)
        required: true
      - name: gcoa_account
        type: string
        description: Číslo účtu v globální účetní osnově (GCOA)
        required: true
      - name: gl_balance
        type: decimal
        description: Celkový zůstatek na účtu hlavní knihy
        required: true
      - name: currency
        type: string
        description: Měna účtu - ISO 4217 kód
        required: true
      - name: created_at
        type: timestamp
        description: Čas vygenerování záznamu
        required: true

quality:
  - rule: not_null
    field: record_id
    description: ID záznamu nesmí být prázdné
  - rule: unique
    field: record_id
    description: Každý záznam musí mít unikátní ID
  - rule: not_null
    field: business_date
    description: Datum záznamu nesmí být prázdné
  - rule: not_null
    field: gcoa_account
    description: Vazba na GCOA nesmí chybět
  - rule: not_null
    field: gl_balance
    description: Hodnota zůstatku nesmí být prázdná

sla:
  availability: 99.5%
  data_latency: T+1
  retention_period: 36 months
  support_contact: josef.kunik@nova-banka.cz
